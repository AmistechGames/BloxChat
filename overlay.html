<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BloxChat Overlay</title>

<style>

body {
    margin: 0;
    background: #1e1f22;
    font-family: Arial;
    overflow: hidden;
}

/* CHANNEL SELECTOR */
#channelSelect {
    position: absolute;
    top: 10px;
    left: 10px;

    background: #2b2d31;
    color: white;

    border: none;
    border-radius: 8px;

    padding: 8px;

    z-index: 999;
}

/* CHAT */
#chat {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;

    display: flex;
    flex-direction: column;
    gap: 6px;
}

.message {
    background: #2b2d31;
    color: white;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;

    word-wrap: break-word;
}

.username {
    color: #8ab4ff;
    font-weight: bold;
}

/* Twitch emotes (basic support) */
.message img {
    height: 20px;
    vertical-align: middle;
}

/* small fade for new messages */
@keyframes pop {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
}

.message {
    animation: pop 0.15s ease;
}

</style>
</head>

<body>

<select id="channelSelect"></select>

<div id="chat"></div>

<script>

const chat = document.getElementById("chat");
const select = document.getElementById("channelSelect");

let lastMessages = [];

// =====================================================
// LOAD CHANNELS
// =====================================================

async function loadChannels() {
    try {
        const res = await fetch("/channels");
        const channels = await res.json();

        select.innerHTML = "";

        channels.forEach(ch => {
            const option = document.createElement("option");
            option.value = ch;
            option.textContent = ch;
            select.appendChild(option);
        });

    } catch (e) {
        console.log("Channel load error", e);
    }
}

// =====================================================
// SWITCH CHANNEL
// =====================================================

select.addEventListener("change", async (e) => {

    await fetch("/select/" + e.target.value);

    chat.innerHTML = "";
    lastMessages = [];

});

// =====================================================
// SIMPLE EMOTE SUPPORT (SAFE)
// =====================================================

function parseEmotes(text) {
    return text.replace(
        /(https:\/\/static-cdn\.jtvnw\.net\/emoticons\/v2\/\d+\/default\/dark\/1\.0)/g,
        '<img src="$1">'
    );
}

// =====================================================
// UPDATE CHAT
// =====================================================

async function updateChat() {

    try {

        const res = await fetch("/messages");
        const messages = await res.json();

        if (!messages || messages.length === 0) return;

        const last = messages[messages.length - 1];

        if (lastMessages.length > 0 && last.id === lastMessages[lastMessages.length - 1].id) {
            return;
        }

        lastMessages = messages;

        chat.innerHTML = "";

        messages.forEach(m => {

            const div = document.createElement("div");
            div.className = "message";

            const msg = parseEmotes(m.message);

            div.innerHTML =
                `<span class="username">${m.user}:</span> ${msg}`;

            chat.appendChild(div);
        });

    } catch (err) {
        console.log("Overlay error", err);
    }
}

// =====================================================
// INIT
// =====================================================

loadChannels();

setInterval(updateChat, 300);

</script>

</body>
</html>
